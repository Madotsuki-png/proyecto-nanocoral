version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_USER=Rafael
      - DB_PASSWORD=123456789
      - DB_HOST=host.docker.internal
      - DB_PORT=1521
      - DB_SID=xe
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - nanocoral-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - nanocoral-network

networks:
  nanocoral-network:
    driver: bridge
